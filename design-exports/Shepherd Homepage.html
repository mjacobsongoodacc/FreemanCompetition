<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shepherd · Homepage explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Source Serif 4', Georgia, serif; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="homepage/data.jsx"></script>
<script type="text/babel" src="homepage/variant-advisory.jsx"></script>
<script type="text/babel" src="homepage/variant-companion.jsx"></script>
<script type="text/babel" src="homepage/variant-signal.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="homepage-v1" title="Shepherd · Pre-auth homepage" subtitle="Three distinct directions — open any artboard fullscreen to read / interact">
        <DCArtboard id="advisory"  label="A · Advisory — field bulletin"    width={1280} height={2400}>
          <VariantAdvisory />
        </DCArtboard>
        <DCArtboard id="companion" label="B · Companion — editorial letter" width={1280} height={2600}>
          <VariantCompanion />
        </DCArtboard>
        <DCArtboard id="signal"    label="C · Signal — ops console"         width={1280} height={2500}>
          <VariantSignal />
        </DCArtboard>
      </DCSection>

      <DCPostIt x={40} y={40} width={280}>
        Three directions, each full-bleed. Drag the grip to reorder. Click the expand icon on any artboard to read it fullscreen. All three use humanist serif + mono accents per your answers, with live widgets instead of generic hero tropes.
      </DCPostIt>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
